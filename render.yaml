services:
  - type: web
    name: sustainability-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: sustainability-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
    rootDir: backend

databases:
  - name: sustainability-db
    databaseName: sustainability_platform
    plan: free
